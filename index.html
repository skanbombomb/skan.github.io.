<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Audio Motion Image</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #050505;
      color: white;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .ui {
      position: fixed;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 10;
      max-width: 560px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.48);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.45);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(165, 243, 252, 0.8);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 54px);
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .track-label {
      margin: 0 0 4px;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.48);
    }

    .track-name {
      margin: 0 0 14px;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    label.upload,
    button {
      appearance: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    label.upload {
      border: 0;
      background: white;
      color: #09090b;
    }

    button {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.12);
      color: white;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    label.upload:hover,
    button:hover:not(:disabled) {
      transform: translateY(-1px) scale(1.02);
    }

    input[type="file"] { display: none; }

    audio {
      width: 100%;
      margin-top: 14px;
      opacity: 0.78;
    }

    .hint {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 11;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      font-size: 12px;
      color: rgba(255,255,255,0.75);
    }

    @media (max-width: 720px) {
      .ui {
        left: 14px;
        right: 14px;
        bottom: 14px;
        max-width: none;
      }
      .hint { display: none; }
    }
  </style>
</head>
<body>
  <canvas id="visualizer"></canvas>

  <main class="ui">
    <p class="eyebrow">WebGL Motion Graphic</p>
    <h1>Office image dances with the beat.</h1>

    <p class="track-label">Current Track</p>
    <p id="trackName" class="track-name">No track loaded</p>

    <div class="controls">
      <label class="upload">
        Upload music
        <input id="fileInput" type="file" accept="audio/*" />
      </label>
      <button id="playButton" disabled>Play</button>
    </div>

    <audio id="audio" controls></audio>
  </main>

  <div class="hint">Image source: 01.png / Bass = zoom / High = sparkle</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const IMAGE_PATH = "./01.png";

    const canvas = document.getElementById("visualizer");
    const fileInput = document.getElementById("fileInput");
    const playButton = document.getElementById("playButton");
    const trackName = document.getElementById("trackName");
    const audio = document.getElementById("audio");

    let audioContext = null;
    let analyser = null;
    let source = null;
    let dataArray = null;
    let objectUrl = null;
    let isPlaying = false;

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    const textureLoader = new THREE.TextureLoader();
    const imageTexture = textureLoader.load(IMAGE_PATH);
    imageTexture.colorSpace = THREE.SRGBColorSpace;

    const imageMaterial = new THREE.MeshBasicMaterial({ map: imageTexture });
    const imagePlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1, 80, 80), imageMaterial);
    mainGroup.add(imagePlane);

    const glowMaterial = new THREE.MeshBasicMaterial({
      color: 0xff5eea,
      transparent: true,
      opacity: 0.0,
      blending: THREE.AdditiveBlending
    });
    const glowPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), glowMaterial);
    glowPlane.position.z = 0.03;
    mainGroup.add(glowPlane);

    const scanlineCanvas = document.createElement("canvas");
    scanlineCanvas.width = 32;
    scanlineCanvas.height = 32;
    const scanCtx = scanlineCanvas.getContext("2d");
    scanCtx.fillStyle = "rgba(255,255,255,0.0)";
    scanCtx.fillRect(0, 0, 32, 32);
    scanCtx.fillStyle = "rgba(255,255,255,0.08)";
    scanCtx.fillRect(0, 0, 32, 1);
    const scanTexture = new THREE.CanvasTexture(scanlineCanvas);
    scanTexture.wrapS = THREE.RepeatWrapping;
    scanTexture.wrapT = THREE.RepeatWrapping;
    scanTexture.repeat.set(1, 90);

    const scanMaterial = new THREE.MeshBasicMaterial({
      map: scanTexture,
      transparent: true,
      opacity: 0.16,
      blending: THREE.AdditiveBlending
    });
    const scanPlane = new THREE.Mesh(new THREE.PlaneGeometry(1, 1), scanMaterial);
    scanPlane.position.z = 0.04;
    mainGroup.add(scanPlane);

    const particleCount = 420;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpeeds = [];

    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 2;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 2;
      particlePositions[i * 3 + 2] = 0.08;
      particleSpeeds.push(0.15 + Math.random() * 0.5);
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: 0x9be7ff,
      size: 0.012,
      transparent: true,
      opacity: 0.45,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const equalizerGroup = new THREE.Group();
    scene.add(equalizerGroup);

    const bars = [];
    const barCount = 42;
    for (let i = 0; i < barCount; i++) {
      const bar = new THREE.Mesh(
        new THREE.PlaneGeometry(0.018, 0.12),
        new THREE.MeshBasicMaterial({
          color: i % 3 === 0 ? 0xff5eea : i % 3 === 1 ? 0x22d3ee : 0xffd166,
          transparent: true,
          opacity: 0.72,
          blending: THREE.AdditiveBlending
        })
      );
      bars.push(bar);
      equalizerGroup.add(bar);
    }

    function resizeImageToCover() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const viewAspect = vw / vh;
      const imgAspect = imageTexture.image ? imageTexture.image.width / imageTexture.image.height : 1;

      let w;
      let h;
      if (viewAspect > imgAspect) {
        w = 2;
        h = 2 * viewAspect / imgAspect;
      } else {
        h = 2;
        w = 2 * imgAspect / viewAspect;
      }

      imagePlane.scale.set(w, h, 1);
      glowPlane.scale.set(w, h, 1);
      scanPlane.scale.set(w, h, 1);

      equalizerGroup.position.set(0, -0.82, 0.2);
      equalizerGroup.scale.set(1, 1, 1);
      bars.forEach((bar, i) => {
        const x = -0.9 + (i / (barCount - 1)) * 1.8;
        bar.position.set(x, 0, 0.2);
      });
    }

    imageTexture.onload = resizeImageToCover;
    setTimeout(resizeImageToCover, 300);

    function average(arr, start, end) {
      if (!arr) return 0;
      let sum = 0;
      let count = 0;
      for (let i = start; i < end && i < arr.length; i++) {
        sum += arr[i];
        count++;
      }
      return count ? sum / count : 0;
    }

    async function setupAudioGraph() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextClass();

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.78;

        source = audioContext.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioContext.destination);

        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(file);

      audio.src = objectUrl;
      audio.load();
      trackName.textContent = file.name;
      playButton.disabled = false;
      playButton.textContent = "Play";
      isPlaying = false;
    });

    playButton.addEventListener("click", async () => {
      if (!audio.src) return;
      await setupAudioGraph();

      if (audio.paused) {
        await audio.play();
        isPlaying = true;
        playButton.textContent = "Pause";
      } else {
        audio.pause();
        isPlaying = false;
        playButton.textContent = "Play";
      }
    });

    audio.addEventListener("ended", () => {
      isPlaying = false;
      playButton.textContent = "Play";
    });

    function animate(time) {
      requestAnimationFrame(animate);

      let bass = 0;
      let mid = 0;
      let high = 0;
      let energy = 0;

      if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        bass = average(dataArray, 0, 18) / 255;
        mid = average(dataArray, 18, 95) / 255;
        high = average(dataArray, 95, 180) / 255;
        energy = (bass * 1.5 + mid + high * 0.8) / 3.3;
      }

      const t = time * 0.001;
      const idle = isPlaying ? 1 : 0.25;

      const zoom = 1 + bass * 0.035 * idle + energy * 0.018 * idle;
      mainGroup.scale.set(zoom, zoom, 1);
      mainGroup.rotation.z = Math.sin(t * 1.2) * 0.006 * idle + mid * 0.012 * idle;
      mainGroup.position.x = Math.sin(t * 1.8) * 0.012 * energy * idle;
      mainGroup.position.y = Math.cos(t * 1.5) * 0.01 * energy * idle;

      glowMaterial.opacity = 0.035 + bass * 0.18 + high * 0.08;
      glowMaterial.color.setHSL((0.82 + high * 0.22 + t * 0.03) % 1, 0.9, 0.62);

      scanTexture.offset.y -= 0.002 + high * 0.018;
      scanMaterial.opacity = 0.08 + high * 0.22;

      const positions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const index = i * 3;
        positions[index + 1] += particleSpeeds[i] * (0.001 + high * 0.006);
        positions[index] += Math.sin(t * 2 + i) * 0.0005 * (1 + energy * 8);

        if (positions[index + 1] > 1.1) {
          positions[index + 1] = -1.1;
          positions[index] = (Math.random() - 0.5) * 2;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particles.material.size = 0.007 + high * 0.025 + bass * 0.01;
      particles.material.opacity = 0.2 + energy * 0.75;

      bars.forEach((bar, i) => {
        const value = dataArray ? (dataArray[Math.floor(i * 4.5)] || 0) / 255 : 0;
        const h = 0.05 + value * 0.32 + bass * 0.08;
        bar.scale.y = h * 6;
        bar.position.y = h * 0.42;
        bar.material.opacity = 0.25 + value * 0.75;
      });

      renderer.render(scene, camera);
    }

    animate(0);

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      resizeImageToCover();
    });
  </script>
</body>
</html>
