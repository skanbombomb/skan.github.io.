<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Audio Motion Image</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050505;
      color: white;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    .ui {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 10;
      width: min(560px, calc(100vw - 48px));
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(0, 0, 0, 0.52);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.48);
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(165, 243, 252, 0.82);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(28px, 5vw, 52px);
      line-height: 0.95;
      letter-spacing: -0.055em;
    }

    .track-label {
      margin: 0 0 4px;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.48);
    }

    .track-name {
      margin: 0 0 14px;
      font-size: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    label.upload,
    button {
      appearance: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    label.upload {
      border: 0;
      background: white;
      color: #09090b;
    }

    button {
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    label.upload:hover,
    button:hover:not(:disabled) {
      transform: translateY(-1px) scale(1.02);
    }

    input[type="file"] {
      display: none;
    }

    audio {
      width: 100%;
      margin-top: 14px;
      opacity: 0.78;
    }

    .hint {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 11;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
    }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, 0.75);
      background: #050505;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    .loading.hide {
      opacity: 0;
    }

    @media (max-width: 720px) {
      .ui {
        left: 14px;
        bottom: 14px;
        width: calc(100vw - 28px);
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="visualizer"></canvas>
  <div id="loading" class="loading">Loading 01.png...</div>

  <main class="ui">
    <p class="eyebrow">WebGL Motion Graphic</p>
    <h1>Office image dances with the beat.</h1>

    <p class="track-label">Current Track</p>
    <p id="trackName" class="track-name">No track loaded</p>

    <div class="controls">
      <label class="upload">
        Upload music
        <input id="fileInput" type="file" accept="audio/*" />
      </label>
      <button id="playButton" disabled>Play</button>
      <button id="demoButton">Demo Motion</button>
    </div>

    <audio id="audio" controls></audio>
  </main>

  <div class="hint">Image: 01.png / Bass = zoom / Treble = sparkle</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

    const IMAGE_PATH = "./01.png";

    const canvas = document.getElementById("visualizer");
    const loading = document.getElementById("loading");
    const fileInput = document.getElementById("fileInput");
    const playButton = document.getElementById("playButton");
    const demoButton = document.getElementById("demoButton");
    const trackName = document.getElementById("trackName");
    const audio = document.getElementById("audio");

    let audioContext = null;
    let analyser = null;
    let source = null;
    let dataArray = null;
    let objectUrl = null;
    let isPlaying = false;
    let demoMode = false;
    let imageReady = false;

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
    camera.position.z = 10;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: false
    });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const mainGroup = new THREE.Group();
    scene.add(mainGroup);

    const textureLoader = new THREE.TextureLoader();
    const imageTexture = textureLoader.load(
      IMAGE_PATH,
      () => {
        imageReady = true;
        resizeImageToCover();
        loading.classList.add("hide");
      },
      undefined,
      () => {
        loading.textContent = "Cannot load 01.png. Put 01.png beside index.html.";
      }
    );
    imageTexture.colorSpace = THREE.SRGBColorSpace;

    const imageMaterial = new THREE.MeshBasicMaterial({
      map: imageTexture
    });

    const imagePlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1, 96, 96),
      imageMaterial
    );
    imagePlane.position.z = 0;
    mainGroup.add(imagePlane);

    const glowMaterial = new THREE.MeshBasicMaterial({
      color: 0xff5eea,
      transparent: true,
      opacity: 0,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const glowPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      glowMaterial
    );
    glowPlane.position.z = 0.03;
    mainGroup.add(glowPlane);

    const vignetteMaterial = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.18,
      depthWrite: false
    });

    const vignettePlane = new THREE.Mesh(
      new THREE.PlaneGeometry(2.2, 2.2),
      vignetteMaterial
    );
    vignettePlane.position.z = 0.06;
    scene.add(vignettePlane);

    const scanlineCanvas = document.createElement("canvas");
    scanlineCanvas.width = 32;
    scanlineCanvas.height = 32;
    const scanCtx = scanlineCanvas.getContext("2d");
    scanCtx.clearRect(0, 0, 32, 32);
    scanCtx.fillStyle = "rgba(255,255,255,0.08)";
    scanCtx.fillRect(0, 0, 32, 1);

    const scanTexture = new THREE.CanvasTexture(scanlineCanvas);
    scanTexture.wrapS = THREE.RepeatWrapping;
    scanTexture.wrapT = THREE.RepeatWrapping;
    scanTexture.repeat.set(1, 90);

    const scanMaterial = new THREE.MeshBasicMaterial({
      map: scanTexture,
      transparent: true,
      opacity: 0.12,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const scanPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(1, 1),
      scanMaterial
    );
    scanPlane.position.z = 0.04;
    mainGroup.add(scanPlane);

    const particleCount = 520;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpeeds = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3] = (Math.random() - 0.5) * 2.1;
      particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 2.1;
      particlePositions[i * 3 + 2] = 0.12;
      particleSpeeds[i] = 0.18 + Math.random() * 0.65;
    }

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute("position", new THREE.BufferAttribute(particlePositions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: 0x9be7ff,
      size: 0.01,
      transparent: true,
      opacity: 0.42,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const equalizerGroup = new THREE.Group();
    scene.add(equalizerGroup);

    const bars = [];
    const barCount = 44;

    for (let i = 0; i < barCount; i++) {
      const barMaterial = new THREE.MeshBasicMaterial({
        color: i % 3 === 0 ? 0xff5eea : i % 3 === 1 ? 0x22d3ee : 0xffd166,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const bar = new THREE.Mesh(new THREE.PlaneGeometry(0.018, 0.12), barMaterial);
      bars.push(bar);
      equalizerGroup.add(bar);
    }

    function resizeImageToCover() {
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const viewAspect = vw / vh;
      const imgAspect = imageTexture.image
        ? imageTexture.image.width / imageTexture.image.height
        : 1;

      let w;
      let h;

      if (viewAspect > imgAspect) {
        w = 2;
        h = 2 * viewAspect / imgAspect;
      } else {
        h = 2;
        w = 2 * imgAspect / viewAspect;
      }

      imagePlane.scale.set(w, h, 1);
      glowPlane.scale.set(w, h, 1);
      scanPlane.scale.set(w, h, 1);

      equalizerGroup.position.set(0, -0.82, 0.2);
      bars.forEach((bar, i) => {
        const x = -0.9 + (i / (barCount - 1)) * 1.8;
        bar.position.set(x, 0, 0.2);
      });
    }

    function average(arr, start, end) {
      if (!arr) return 0;
      let sum = 0;
      let count = 0;

      for (let i = start; i < end && i < arr.length; i++) {
        sum += arr[i];
        count++;
      }

      return count ? sum / count : 0;
    }

    async function setupAudioGraph() {
      if (!audioContext) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        audioContext = new AudioContextClass();

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.78;

        source = audioContext.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioContext.destination);

        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
    }

    fileInput.addEventListener("change", () => {
      const file = fileInput.files && fileInput.files[0];
      if (!file) return;

      if (objectUrl) URL.revokeObjectURL(objectUrl);
      objectUrl = URL.createObjectURL(file);

      demoMode = false;
      isPlaying = false;
      audio.src = objectUrl;
      audio.load();

      trackName.textContent = file.name;
      playButton.disabled = false;
      playButton.textContent = "Play";
      demoButton.textContent = "Demo Motion";
    });

    playButton.addEventListener("click", async () => {
      if (!audio.src) return;

      demoMode = false;
      await setupAudioGraph();

      if (audio.paused) {
        await audio.play();
        isPlaying = true;
        playButton.textContent = "Pause";
        demoButton.textContent = "Demo Motion";
      } else {
        audio.pause();
        isPlaying = false;
        playButton.textContent = "Play";
      }
    });

    demoButton.addEventListener("click", () => {
      demoMode = !demoMode;
      isPlaying = demoMode;

      if (demoMode) {
        if (!audio.paused) audio.pause();
        playButton.textContent = "Play";
        demoButton.textContent = "Stop Demo";
        trackName.textContent = "Demo motion preview";
      } else {
        demoButton.textContent = "Demo Motion";
        if (!audio.src) trackName.textContent = "No track loaded";
      }
    });

    audio.addEventListener("ended", () => {
      isPlaying = false;
      playButton.textContent = "Play";
    });

    function getAudioEnergy(time) {
      let bass = 0;
      let mid = 0;
      let high = 0;
      let energy = 0;

      if (demoMode) {
        bass = 0.42 + Math.max(0, Math.sin(time * 4.2)) * 0.58;
        mid = 0.32 + Math.max(0, Math.sin(time * 2.7 + 1.4)) * 0.48;
        high = 0.2 + Math.max(0, Math.sin(time * 8.5 + 0.6)) * 0.62;
      } else if (analyser && dataArray) {
        analyser.getByteFrequencyData(dataArray);
        bass = average(dataArray, 0, 18) / 255;
        mid = average(dataArray, 18, 95) / 255;
        high = average(dataArray, 95, 180) / 255;
      }

      energy = (bass * 1.5 + mid + high * 0.8) / 3.3;
      return { bass, mid, high, energy };
    }

    function animate(timeMs) {
      requestAnimationFrame(animate);

      const t = timeMs * 0.001;
      const { bass, mid, high, energy } = getAudioEnergy(t);
      const active = isPlaying || demoMode;
      const activeAmount = active ? 1 : 0.18;

      const zoom = 1 + bass * 0.04 * activeAmount + energy * 0.018 * activeAmount;
      mainGroup.scale.set(zoom, zoom, 1);
      mainGroup.rotation.z = Math.sin(t * 1.2) * 0.006 * activeAmount + mid * 0.012 * activeAmount;
      mainGroup.position.x = Math.sin(t * 1.8) * 0.012 * energy * activeAmount;
      mainGroup.position.y = Math.cos(t * 1.5) * 0.01 * energy * activeAmount;

      glowMaterial.opacity = 0.02 + bass * 0.18 * activeAmount + high * 0.08 * activeAmount;
      glowMaterial.color.setHSL((0.82 + high * 0.22 + t * 0.03) % 1, 0.9, 0.62);

      scanTexture.offset.y -= 0.002 + high * 0.018 * activeAmount;
      scanMaterial.opacity = 0.06 + high * 0.2 * activeAmount;

      const positions = particles.geometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const index = i * 3;
        positions[index + 1] += particleSpeeds[i] * (0.0007 + high * 0.006 * activeAmount);
        positions[index] += Math.sin(t * 2 + i) * 0.00045 * (1 + energy * 8 * activeAmount);

        if (positions[index + 1] > 1.1) {
          positions[index + 1] = -1.1;
          positions[index] = (Math.random() - 0.5) * 2.1;
        }
      }
      particles.geometry.attributes.position.needsUpdate = true;
      particleMaterial.size = 0.006 + high * 0.026 * activeAmount + bass * 0.01 * activeAmount;
      particleMaterial.opacity = 0.16 + energy * 0.72 * activeAmount;

      bars.forEach((bar, i) => {
        const value = demoMode
          ? Math.max(0.05, Math.sin(t * 4 + i * 0.35) * 0.5 + 0.5) * energy
          : dataArray
            ? (dataArray[Math.floor(i * 4.5)] || 0) / 255
            : 0;

        const h = 0.05 + value * 0.32 * activeAmount + bass * 0.08 * activeAmount;
        bar.scale.y = h * 6;
        bar.position.y = h * 0.42;
        bar.material.opacity = 0.16 + value * 0.8 * activeAmount;
      });

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      if (imageReady) resizeImageToCover();
    });
  </script>
</body>
</html>
